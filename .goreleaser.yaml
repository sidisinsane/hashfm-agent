# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./internal/schema

builds:
  - main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - arm64
      - amd64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - spec.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"

brews:
  - name: hashfm-agent
    repository:
      owner: sidisinsane
      name: homebrew-tap
    folder: Formula
    description: Extracts hashfms from shell scripts and produces a machine-readable index for LLM agents
    license: MIT
    homepage: https://github.com/sidisinsane/hashfm-agent

release:
  footer: |-
    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
